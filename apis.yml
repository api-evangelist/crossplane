apis:
- aid: crossplane:crossplane-kubernetes-api
  name: Crossplane Kubernetes API
  description: >-
    The Crossplane Kubernetes API extends the Kubernetes API with custom
    resources including Compositions, CompositeResourceDefinitions (XRDs),
    Providers, ProviderConfigs, and Claims. These resources allow declarative
    management of cloud infrastructure and services through standard Kubernetes
    manifests and the kubectl CLI.
  humanURL: https://docs.crossplane.io/latest/api/
  baseURL: https://kubernetes.default.svc
  tags:
  - Kubernetes
  - Infrastructure as Code
  - Control Plane
