aid: crossplane
name: Crossplane
description: >-
  Open source Kubernetes add-on that transforms your cluster into a universal
  control plane, enabling you to manage cloud infrastructure, services, and
  applications using Kubernetes-style declarative configuration. Crossplane is
  a graduated Cloud Native Computing Foundation project.
type: Index
url: https://raw.githubusercontent.com/api-evangelist/crossplane/refs/heads/main/apis.yml
