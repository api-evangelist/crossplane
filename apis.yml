apis:
  - aid: crossplane:crossplane-kubernetes-api
    name: Crossplane Kubernetes API
    description: >-
      The Crossplane Kubernetes API extends the Kubernetes API server with
      custom resources for managing cloud infrastructure declaratively.
      Resources are organized into two main API groups:
      apiextensions.crossplane.io for composition primitives
      (Compositions, CompositeResourceDefinitions, EnvironmentConfigs,
      DeploymentRuntimeConfigs) and pkg.crossplane.io for package
      management (Providers, Functions, Configurations and their
      revisions). All operations use standard Kubernetes REST conventions
      and are authenticated through the Kubernetes API server's
      authentication mechanisms.
