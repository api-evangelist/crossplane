aid: crossplane
name: Crossplane
x-type: opensource
description: >-
  Crossplane is a graduated CNCF open-source Kubernetes add-on that
  transforms a cluster into a universal control plane for cloud
  infrastructure, services, and applications. Crossplane introduces
  custom resources including CompositeResourceDefinitions (XRDs),
  Compositions, Claims, Providers, ProviderConfigs, Configurations,
  Functions, and EnvironmentConfigs, allowing platform teams to author
  self-service platform APIs that compose managed resources across AWS,
  GCP, Azure, and other providers using Kubernetes-style declarative
  configuration.
